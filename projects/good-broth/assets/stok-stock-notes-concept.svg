<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">STŌK Stock Notes concept</title>
  <desc id="desc">A research-forward Stock Notes interface beside a broth cup, QR code, flavor map, and functional mode tokens.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eadcc9"/>
    </linearGradient>
    <linearGradient id="broth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1b544"/>
      <stop offset="1" stop-color="#7a3d24"/>
