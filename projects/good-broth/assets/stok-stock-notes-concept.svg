  </defs>
  <rect width="1400" height="980" rx="44" fill="#1c1510"/>
  <circle cx="266" cy="238" r="210" fill="#b76635" opacity=".42"/>
  <circle cx="1110" cy="760" r="250" fill="#55745a" opacity=".34"/>
